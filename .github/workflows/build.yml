name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK with Gradle
      run: |
        # Check if project is in root or subfolder and build
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        elif [ -d "android-project" ]; then
          cd android-project
          chmod +x gradlew || true
          ./gradlew assembleDebug --stacktrace || gradle assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HollowOverlay-APK
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          android-project/app/build/outputs/apk/debug/app-debug.apk
          
