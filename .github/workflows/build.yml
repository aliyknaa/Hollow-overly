name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip project.zip and Prepare Files
      run: |
        unzip -o project.zip -d extracted_files
        if [ -d "extracted_files/android-project" ]; then
          cp -r extracted_files/android-project/* .
        elif [ -d "extracted_files/app" ]; then
          cp -r extracted_files/* .
        else
          cp -r extracted_files/* .
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK with Gradle
      run: |
        chmod +x gradlew || true
        ./gradlew assembleDebug --stacktrace || gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HollowOverlay-APK
        path: app/build/outputs/apk/debug/app-debug.apk
